name: Executar e gerar relatório

on: [push]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Rodar código com entrada fixa
      run: |
        python trabalho.py "0 0 1; 0 1 3; 1 0 2; 1 1 1;" > relatorio.txt

    - name: Salvar relatório
      uses: actions/upload-artifact@v4
      with:
        name: relatorio
        path: relatorio.txt
